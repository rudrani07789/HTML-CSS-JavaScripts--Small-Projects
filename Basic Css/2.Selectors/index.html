<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Selectors in HTML</h1></header>
    <main>
       <article id="first">
        <h2>Element Selector</h2>
        <p>This element selector selects <span class="highlight">HTML elements</span> based on the element name.</p>
       </article> 
       <article id="second" class="purple highlight">
         <h2>ID selector</h2>
         <p>This is ID selector</p>
       </article>
       <article id="third">
         <h2>Class Selector</h2>
         <p class="highlight">This class selector selects HTML elements with a specific class attribute</p>
       </article>

    </main>
</body>
</html>
